spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${db.host}:${db.port}/${db.name}?currentSchema=notification_service
    username: ${db.username}
    password: ${db.password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notification_service
        format_sql: true
    show-sql: false
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: notification_service

  kafka:
    bootstrap-servers: ${kafka.bootstrap-servers}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      properties:
        max.poll.records: 10

resend:
  api:
    key: ${RESEND_API_KEY}

app:
  kafka:
    topics:
      email-verification: email-verification
  mail:
    from: ${mail.from}
  notification:
    retry:
      max-retries: ${NOTIFICATION_MAX_RETRIES:5}
      scheduler-interval-ms: ${NOTIFICATION_RETRY_INTERVAL_MS:60000}

server:
  port: ${server.port:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
